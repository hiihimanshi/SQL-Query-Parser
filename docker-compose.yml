version: '3.8'

services:
  query-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: query-master-cli
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./schemas:/app/schemas
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - DEBUG=true
    stdin_open: true
    tty: true
    networks:
      - query-network

networks:
  query-network:
    driver: bridge
